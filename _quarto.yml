project:
  type: default
  title: "Why MTTR Alone Misleads: Add MOVA to Measure Real Risk"
  render:
    - index.qmd
  execute-dir: project

execute:
  freeze: false
  warning: false
  message: false
  daemon: false

format:
  revealjs:
    theme: simple
    css: styles.css
    width: 1600
    height: 900
    margin: 0.05
    slide-number: c/t
    transition: fade
    background-transition: fade
    controls: true
    progress: true
    center: false
    hash: true
    embed-resources: true
    code-copy: true
    code-overflow: wrap
    incremental: false
    preview-links: false
    navigation-mode: linear
    controls-layout: edges
    auto-animate-easing: ease-out
    title-slide-attributes:
      data-background-color: "#f5efe4"
      class: "title-slide"
    footer: "BSides Charm 2026 · Caleb Kinney"
