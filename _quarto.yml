project:
  type: default
  render:
    - index.qmd
  execute-dir: project
  output-dir: _output
  pre-render:
    - python scripts/01_generate_data.py
    - python scripts/02_simulate_metrics.py
    - python scripts/03_build_outputs.py
  preview:
    port: 4200

format:
  revealjs:
    theme: simple
    css: styles.css
    highlight-style: github
    width: 1600
    height: 900
    margin: 0.04
    slide-number: c/t
    transition: fade
    transition-speed: fast
    background-transition: fade
    controls: false
    progress: true
    center: false
    center-title-slide: true
    hash: true
    history: false
    embed-resources: true
    code-overflow: wrap
    auto-stretch: false
    auto-animate-easing: ease-out
    auto-animate-duration: 0.55
    title-slide-attributes:
      data-background-color: "#f6f0e5"
