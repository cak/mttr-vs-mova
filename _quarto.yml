project:
  type: default
  render:
    - index.qmd
  execute-dir: project
  output-dir: _output
  resources:
    - assets/**
  pre-render:
    - uv run python scripts/01_generate_data.py
    - uv run python scripts/02_simulate_metrics.py
    - uv run python scripts/03_build_outputs.py
  preview:
    port: 4200

format:
  revealjs:
    footer: "Caleb Kinney · typeerror.com/mova"
    theme: simple
    css: styles.css
    highlight-style: github
    width: 1600
    height: 900
    margin: 0.04
    slide-number: c/t
    transition: fade
    background-transition: fade
    controls: false
    progress: true
    center: false
    hash: true
    history: false
    embed-resources: true
    code-overflow: wrap
    auto-stretch: false
    auto-animate-easing: ease-out
    auto-animate-duration: 0.55
